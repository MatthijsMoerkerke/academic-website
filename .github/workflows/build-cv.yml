name: Build CV PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Pandoc and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Build CV markdown
        run: python scripts/build_cv.py

      - name: Generate PDF
        run: |
          mkdir -p static/uploads
          pandoc cv/cv_generated.md \
            -o static/uploads/CV_Matthijs_Moerkerke.pdf \
            --standalone \
            --css=cv/style.css \
            --pdf-engine=wkhtmltopdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add static/uploads/Curriculum_Vitae_Matthijs_Moerkerke.pdf cv/cv_generated.md
          git diff --cached --quiet || git commit -m "Auto-update CV PDF"
          git push
