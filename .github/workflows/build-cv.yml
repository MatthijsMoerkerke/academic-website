name: Build CV PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'content/_index.md'
      - 'content/publications/**'
      - 'data/scholar.yaml'
      - 'scripts/build_cv.py'
      - 'cv/**'
      - '.github/workflows/build-cv.yml'

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install Python packages
        run: |
          pip install pyyaml markdown


      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf


      - name: Build CV HTML
        run: |
          python scripts/build_cv.py


      - name: Generate PDF
        run: |
          mkdir -p static/uploads
          wkhtmltopdf \
            --enable-local-file-access \
            cv/cv_generated.html \
            static/uploads/CV_Matthijs_Moerkerke.pdf

      - name: Commit updated CV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git stash push --include-untracked -m "cv-build-temp"
      
          git fetch origin main
          git pull --rebase origin main
      
          git stash pop || true
      
          git add cv/cv_generated.html
          git add static/uploads/CV_Matthijs_Moerkerke.pdf
      
          if git diff --cached --quiet; then
            echo "No CV changes"
            exit 0
          fi
      
          git commit -m "Auto update CV" || echo "Nothing to commit"
          git push origin main
