name: Update publications from ORCID

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install requests pyyaml python-slugify

      - name: Run ORCID sync
        run: python scripts/orcid_sync.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/publications

          if git diff --cached --quiet; then
            echo "No publication changes to commit"
            exit 0
          fi

          git commit -m "Update publications from ORCID"
          git push origin main
