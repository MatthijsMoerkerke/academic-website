name: Update publications from ORCID

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install importer
        run: pip install academic

      - name: Fetch ORCID works
        run: |
          curl -H "Accept: application/json" \
          https://pub.orcid.org/v3.0/0000-0002-7133-8418/works \
          > works.json

      - name: Convert to BibTeX
        run: |
          academic import --bibtex works.json

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update publications from ORCID" || echo "No changes"
          git push
