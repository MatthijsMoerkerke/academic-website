name: Sync ORCID and Scholar

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-slugify scholarly markdown

      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Sync ORCID publications
        run: python scripts/orcid_sync.py

      - name: Update Scholar metrics
        run: python scripts/update_scholar.py
        continue-on-error: true

      - name: Generate CV HTML
        run: python scripts/build_cv.py

      - name: Generate CV PDF
        run: |
          mkdir -p static/uploads
          wkhtmltopdf --enable-local-file-access cv/cv_generated.html static/uploads/CV_Matthijs_Moerkerke.pdf

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publications data/scholar.yaml cv/cv_generated.html static/uploads/CV_Matthijs_Moerkerke.pdf
          git diff --cached --quiet || git commit -m "Auto-update publications, scholar metrics, and CV"
          git push

      - name: Trigger Hugo deploy workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run hugo.yml
