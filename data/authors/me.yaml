bio: |
  Matthijs Moerkerke is a postdoctoral researcher at Ghent University (Belgium)
  and voluntary research fellow at KU Leuven (Belgium).

  His research focuses on neurophysiology, pain science, and neuroendocrine
  mechanisms, with a particular interest in the role of oxytocin in autism
  and pain-related processes.

  He investigates how stress physiology, neuroendocrine signaling, and brain
  mechanisms interact with behavior and clinical outcomes, integrating
  neuroimaging, EEG, physiological recordings, and clinical trial methodologies.

  His work aims to translate neurobiological insights into improved diagnostics,
  treatment strategies, and rehabilitation approaches for neurological and
  neurodevelopmental conditions.

